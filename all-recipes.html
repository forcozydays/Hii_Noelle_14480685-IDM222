<!DOCTYPE html>
<html>
    <head>
        <title>all recipes ♡</title>

        <link href="https://fonts.googleapis.com/css2?family=Luxurious+Script&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">

    <body>
        <header>
            <div class="header">
                <nav>
                    <div class="logo">
                        <p class="sitename">To Be LOVED.</p>
                        <h1 class="title-text">All <span class="special-title">Recipes</span></h1>
                    </div>
            
                        <input id="btnmenu" type="checkbox" hidden>
                        <label for="btnmenu">
                            <svg class="hamburger" width="49" height="23" viewBox="0 0 49 23" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <line y1="0.5" x2="49" y2="0.5" stroke="black"/>
                                <line y1="11.5" x2="49" y2="11.5" stroke="black"/>
                                <line y1="22.5" x2="49" y2="22.5" stroke="black"/>
                            </svg>
                                
                            <svg class="X" width="37" height="36" viewBox="0 0 37 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <line x1="0.353539" y1="35.0018" x2="35.0018" y2="0.353562" stroke="black"/>
                                <line x1="1.06065" y1="0.3536" x2="35.7089" y2="35.0018" stroke="black"/>
                            </svg>
                        </label>

                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="all-recipes.html">All Recipes</a></li>
                    </ul>

            </div>
        </header>

        <aside>
            <div class="search-bar">
                <p>What are you <span class="special-text">craving</span> today?</p>
            </div>

            <p>Filter by Cuisine:</p>
            <div class="h-scroll">
                <div class="button">
                    <p>Chinese</p>
                </div>

                <div class="button">
                    <p>Italian</p>
                </div>

                <div class="button">
                    <p>Korean</p>
                </div>
            </div>

            <p>Filter by Flavour:</p>
            <div class="h-scroll">
                <div class="button">
                    <p>Spicy</p>
                </div>

                <div class="button">
                    <p>Non Spicy</p>
                </div>

                <div class="button">
                    <p>Sweet</p>
                </div>
            </div>
        </aside>

        <main>
            <div class="recipe-stack">
                <a href="recipe1.html">
                    <div class="recipe-card-large">
                        <div class="recipe-image">
                            <img src="assests/banana-bread.jpg" alt="a picture of banana bread">
                        </div>
                        <div class="line"></div>
                        <p class="recipe-display-name-large">Banana Bread</p>

                <div class="recipe-card-large">

                    <div class="recipe-image">
                        <img src="assests/miso-carbonara.jpg" alt="a picture of miso Carbonara">

                    <p class="recipe-display-name-large">Miso Carbonara</p>
                </div>

                <div class="recipe-card-large">
                    <div class="recipe-image">
                        <img src="assests/abc-soup.jpg" alt="a picture of abc soup">
                    </div>
                    <div class="line"></div>
                    <p class="recipe-display-name-large">ABC soup</p>
                </div>
            </div>

        <footer>
            <div class="footer">

            </div>
        </footer>
